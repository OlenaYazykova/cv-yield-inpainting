experiment_name: deep_optuna_search

optuna:
  n_trials: 50
  timeout: null
  direction: minimize
  seed: 42

model:
  type: unet
  depth: 4
  base_channels: 16

data:
  patch_size: 128
  stride: 64
  min_valid_ratio: 0.5

holes:
  max_holes: 3
  min_hole_size: 5
  max_hole_size: 20

training:
  epochs: 15
  epochs_final: 100
  batch_size: 4
  lr: 0.001
  weight_decay: 1e-4

loss:
  known_weight: 0.1
  smooth_weight: 0.02

search_space:
  lr:
    type: float
    low: 0.0001
    high: 0.001
    log: true

  smooth_weight:
    type: float
    low: 0.05
    high: 0.15

  known_weight:
    type: float
    low: 0.0
    high: 0.01

  weight_decay:
    type: float
    low: 0.000001
    high: 0.0001
    log: true

runtime:
  seed: 42
  num_workers: 0
  val_ratio: 0.2
  test_ratio: 0.15
