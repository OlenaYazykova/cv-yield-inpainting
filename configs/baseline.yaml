experiment_name: baseline

model:
  type: unet
  base_channels: 16
  depth: 3

training:
  epochs: 50
  batch_size: 8
  lr: 0.001
  weight_decay: 0.0001

data:
  patch_size: 128
  stride: 64
  min_valid_ratio: 0.5

holes:
  max_holes: 3
  min_hole_size: 5
  max_hole_size: 20

loss:
  known_weight: 0.1
  smooth_weight: 0.02

runtime:
  seed: 42
  num_workers: 0
  val_ratio: 0.2
  test_ratio: 0.15
